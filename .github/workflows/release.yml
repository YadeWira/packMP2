name: Release

on:
  push:
    tags: ['v*']

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: |
          chmod +x makedeb.sh
          VERSION="${GITHUB_REF#refs/tags/v}"
          ./makedeb.sh "${VERSION}" amd64

      - name: Upload .deb to release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DEB="packmp2_${VERSION}_amd64.deb"
          gh release upload "${GITHUB_REF#refs/tags/}" "${DEB}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Dispatch to pack-apt
        run: |
          gh api repos/YadeWira/pack-apt/dispatches \
            -f event_type=deb-release \
            -f 'client_payload[repo]=YadeWira/packMP2' \
            -f "client_payload[tag]=${GITHUB_REF#refs/tags/}"
        env:
          GH_TOKEN: ${{ secrets.PACK_APT_TOKEN }}
